<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <link rel="stylesheet" href="../css/clock.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🕐 Global Time Zone Clock</h1>
            <p>Current time across different time zones</p>
        </header>

        <div class="controls">
            <button id="addZoneBtn" class="btn-primary">+ Add Time Zone</button>
            <button id="resetBtn" class="btn-secondary">Reset to Default</button>
        </div>

        <div class="clock-grid" id="clockGrid">
            <!-- Clocks will be dynamically added here -->
        </div>

        <div id="zoneModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Add Time Zone</h2>
                <input type="text" id="searchZone" placeholder="Search time zone..." class="search-input">
                <div id="zoneList" class="zone-list"></div>
            </div>
        </div>
    </div>

    <script src="../js/clock.js"></script>
</body>
</html>
